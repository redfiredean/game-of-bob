<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Bob</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Camera
let cameraX = 0;

// Death wall
let deathWallWorldX = 0;
let deathWallSpikes = [];

function getWallSpeed() {
  // Increases by 0.05 every second, caps at 13 (10× base)
  const seconds = Math.floor(gameTime / 60);
  return 1.3 + Math.min(11.7, seconds * 0.05);
}

function getWallSpeedFraction() {
  return Math.min(1, (getWallSpeed() - 1.3) / 11.7);
}

function createDeathWallSpikes() {
  deathWallSpikes = [];
  for (let y = 50; y < canvas.height - 30; y += 55)
    deathWallSpikes.push({ y, phase: Math.random() * Math.PI * 2 });
}

function getWallSpikeH(phase) {
  const pulse = Math.max(0, Math.sin(gameTime * 0.022 + phase));
  const difficulty = Math.min(1, getDistanceM() / 300);
  return 20 + (8 + difficulty * 35) * pulse;
}

function drawDeathWall() {
  const wallSX = deathWallWorldX - cameraX;

  // Solid wall body from left edge to wall face
  if (wallSX > 0) {
    ctx.fillStyle = '#0d0505';
    ctx.fillRect(0, 0, wallSX, canvas.height);
  }

  // Pulsing glow — widens and brightens as wall speeds up
  if (wallSX > -160 && wallSX < canvas.width + 20) {
    const sf = getWallSpeedFraction();
    const glowW = 90 + sf * 120;
    const gx = Math.max(0, wallSX);
    const grad = ctx.createLinearGradient(gx - glowW, 0, gx, 0);
    grad.addColorStop(0, 'rgba(180,0,0,0)');
    const g = Math.round(30 - sf * 30);
    const alpha = 0.3 + sf * 0.45 + 0.15 * Math.sin(gameTime * 0.07);
    grad.addColorStop(1, `rgba(220,${g},30,${alpha.toFixed(2)})`);
    ctx.fillStyle = grad;
    ctx.fillRect(Math.max(0, gx - glowW), 0, glowW, canvas.height);
  }

  // Spikes on leading edge
  if (wallSX > -60 && wallSX < canvas.width + 60) {
    ctx.lineWidth = 1;
    for (const s of deathWallSpikes) {
      const h = getWallSpikeH(s.phase);
      const pulse = (h - 20) / 63;
      const r = Math.round(180 + pulse * 75), g = Math.round(50 - pulse * 50);
      ctx.fillStyle = `rgb(${r},${g},30)`;
      ctx.strokeStyle = `rgb(${Math.round(r * 0.6)},0,0)`;
      ctx.beginPath();
      ctx.moveTo(wallSX, s.y - 12);
      ctx.lineTo(wallSX + h, s.y);
      ctx.lineTo(wallSX, s.y + 12);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
}

function updateCamera() {
  const target = bob.worldX - canvas.width * 0.35;
  cameraX += (target - cameraX) * 0.1;
  cameraX = Math.max(0, cameraX);
}

function getScreenX() { return bob.worldX - cameraX; }

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createSpikes();
  createDeathWallSpikes();
  bob.worldX = cameraX + canvas.width * 0.35;
  bob.y = canvas.height / 2;
}
window.addEventListener('resize', resizeCanvas);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSqueak() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.2);
}

function playPop() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.15);
}

function playRespawn() {
  [0, 100, 200].forEach((delay, i) => {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400 + i * 200, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.12);
    }, delay);
  });
}

// Bob the rag doll
const bob = {
  worldX: 0,
  y: 300,
  vx: 0,
  vy: 0,
  scale: 1,
  opacity: 1,
  alive: true,
  respawnTimer: 0,
  wobble: 0,
  wobbleSpeed: 0,
  headRadius: 28,
  bodyWidth: 36,
  bodyHeight: 50,
  armLength: 40,
  legLength: 45,
};

function getBobParts() {
  const x = getScreenX();
  const { y, scale } = bob;
  const w = bob.wobble;
  return {
    head: { x: x + Math.sin(w) * 2, y: y - 65 * scale, r: bob.headRadius * scale },
    nose: { x: x + Math.sin(w) * 2 + 2 * scale, y: y - 62 * scale, r: 6 * scale },
    body: { x: x, y: y - 20 * scale, w: bob.bodyWidth * scale, h: bob.bodyHeight * scale },
    leftArm: { x1: x - 18 * scale, y1: y - 38 * scale, x2: x - 38 * scale + Math.sin(w + 1) * 8, y2: y + 5 * scale },
    rightArm: { x1: x + 18 * scale, y1: y - 38 * scale, x2: x + 38 * scale + Math.sin(w + 2) * 8, y2: y + 5 * scale },
    leftLeg: { x1: x - 10 * scale, y1: y + 28 * scale, x2: x - 20 * scale + Math.sin(w) * 5, y2: y + 72 * scale },
    rightLeg: { x1: x + 10 * scale, y1: y + 28 * scale, x2: x + 20 * scale + Math.sin(w + 1.5) * 5, y2: y + 72 * scale },
    leftHand: { x: x - 38 * scale + Math.sin(w + 1) * 8, y: y + 5 * scale, r: 7 * scale },
    rightHand: { x: x + 38 * scale + Math.sin(w + 2) * 8, y: y + 5 * scale, r: 7 * scale },
    leftFoot: { x: x - 20 * scale + Math.sin(w) * 5, y: y + 72 * scale, r: 8 * scale },
    rightFoot: { x: x + 20 * scale + Math.sin(w + 1.5) * 5, y: y + 72 * scale, r: 8 * scale },
  };
}

function drawBob() {
  if (!bob.alive) return;
  ctx.globalAlpha = bob.opacity;
  const p = getBobParts();
  const lw = 4 * bob.scale;

  ctx.strokeStyle = '#5b8c5a'; ctx.lineWidth = lw + 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(p.leftLeg.x1, p.leftLeg.y1); ctx.lineTo(p.leftLeg.x2, p.leftLeg.y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.rightLeg.x1, p.rightLeg.y1); ctx.lineTo(p.rightLeg.x2, p.rightLeg.y2); ctx.stroke();

  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.arc(p.leftFoot.x, p.leftFoot.y, p.leftFoot.r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.rightFoot.x, p.rightFoot.y, p.rightFoot.r, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = '#f4c2a1'; ctx.lineWidth = lw + 2;
  ctx.beginPath(); ctx.moveTo(p.leftArm.x1, p.leftArm.y1); ctx.lineTo(p.leftArm.x2, p.leftArm.y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.rightArm.x1, p.rightArm.y1); ctx.lineTo(p.rightArm.x2, p.rightArm.y2); ctx.stroke();

  ctx.fillStyle = '#f4c2a1';
  ctx.beginPath(); ctx.arc(p.leftHand.x, p.leftHand.y, p.leftHand.r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.rightHand.x, p.rightHand.y, p.rightHand.r, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#4a7ab5';
  const bx = p.body.x - p.body.w / 2, by = p.body.y - p.body.h / 2;
  roundRect(bx, by, p.body.w, p.body.h, 8 * bob.scale); ctx.fill();

  ctx.strokeStyle = '#3a6a9f'; ctx.lineWidth = 3 * bob.scale;
  ctx.beginPath(); ctx.moveTo(bx + 4, by); ctx.lineTo(bx + 8, by - 12 * bob.scale); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + p.body.w - 4, by); ctx.lineTo(bx + p.body.w - 8, by - 12 * bob.scale); ctx.stroke();

  ctx.fillStyle = '#3a6a9f';
  roundRect(p.body.x - 7 * bob.scale, p.body.y + 5 * bob.scale, 14 * bob.scale, 12 * bob.scale, 3 * bob.scale); ctx.fill();

  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(p.body.x, p.body.y - 12 * bob.scale, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#f4c2a1';
  ctx.beginPath(); ctx.arc(p.head.x, p.head.y, p.head.r, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = '#c4926e'; ctx.lineWidth = 1.5 * bob.scale;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.arc(p.head.x, p.head.y, p.head.r - 3 * bob.scale, -0.3, 0.8); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = '#d4a040'; ctx.lineWidth = 2.5 * bob.scale; ctx.lineCap = 'round';
  for (let i = -3; i <= 3; i++) {
    const angle = -Math.PI / 2 + i * 0.2;
    const sx = p.head.x + Math.cos(angle) * (p.head.r - 2);
    const sy = p.head.y + Math.sin(angle) * (p.head.r - 2);
    const ex = p.head.x + Math.cos(angle) * (p.head.r + 8 * bob.scale) + Math.sin(bob.wobble + i) * 3;
    const ey = p.head.y + Math.sin(angle) * (p.head.r + 8 * bob.scale);
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  }

  const eyeOffX = 10 * bob.scale, eyeY = p.head.y - 3 * bob.scale;
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(p.head.x - eyeOffX, eyeY, 5 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(p.head.x - eyeOffX, eyeY, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1 * bob.scale;
  ctx.beginPath();
  ctx.moveTo(p.head.x - eyeOffX - 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x - eyeOffX + 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.moveTo(p.head.x - eyeOffX + 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x - eyeOffX - 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.stroke();

  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(p.head.x + eyeOffX, eyeY, 5 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(p.head.x + eyeOffX, eyeY, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1 * bob.scale;
  ctx.beginPath();
  ctx.moveTo(p.head.x + eyeOffX - 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x + eyeOffX + 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.moveTo(p.head.x + eyeOffX + 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x + eyeOffX - 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.stroke();

  ctx.strokeStyle = '#c4926e'; ctx.lineWidth = 2 * bob.scale;
  ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.arc(p.head.x + 2 * bob.scale, p.head.y + 6 * bob.scale, 8 * bob.scale, 0.2, Math.PI - 0.2); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#e88';
  ctx.beginPath(); ctx.arc(p.nose.x, p.nose.y, p.nose.r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c66'; ctx.lineWidth = 1; ctx.stroke();

  ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
  ctx.beginPath(); ctx.arc(p.head.x - 16 * bob.scale, p.head.y + 4 * bob.scale, 6 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.head.x + 20 * bob.scale, p.head.y + 4 * bob.scale, 6 * bob.scale, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Border spikes (screen-fixed: top and bottom only — left wall is the moving death wall)
const spikes = [];
function createSpikes() {
  spikes.length = 0;
  for (let x = 40; x < canvas.width; x += 60)
    spikes.push({ x, y: canvas.height, w: 20, baseH: 25, phase: Math.random() * Math.PI * 2, dir: 'up' });
  for (let x = 70; x < canvas.width; x += 60)
    spikes.push({ x, y: 0, w: 20, baseH: 25, phase: Math.random() * Math.PI * 2, dir: 'down' });
}

function getSpikeH(s) {
  const pulse = Math.max(0, Math.sin(gameTime * 0.022 + s.phase));
  const difficulty = Math.min(1, getDistanceM() / 300); // ramps over 300m
  return s.baseH + (8 + difficulty * 35) * pulse;
}

function drawSpikes() {
  ctx.lineWidth = 1;
  for (const s of spikes) {
    const h = getSpikeH(s);
    const pulse = (h - s.baseH) / (s.baseH + 43);
    const r = Math.round(180 + pulse * 75), g = Math.round(50 - pulse * 50);
    ctx.fillStyle = `rgb(${r},${g},30)`;
    ctx.strokeStyle = `rgb(${Math.round(r * 0.6)},0,0)`;
    ctx.beginPath();
    if (s.dir === 'up') {
      ctx.moveTo(s.x - s.w / 2, s.y); ctx.lineTo(s.x, s.y - h); ctx.lineTo(s.x + s.w / 2, s.y);
    } else if (s.dir === 'down') {
      ctx.moveTo(s.x - s.w / 2, s.y); ctx.lineTo(s.x, s.y + h); ctx.lineTo(s.x + s.w / 2, s.y);
    } else if (s.dir === 'right') {
      ctx.moveTo(s.x, s.y - s.w / 2); ctx.lineTo(s.x + h, s.y); ctx.lineTo(s.x, s.y + s.w / 2);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
}

// World obstacles — spike pillar pairs in world coordinates
const obstacles = [];
let nextObstacleWorldX = 700;

function getDiff(worldX) {
  return Math.min(1, worldX / 12000); // full difficulty at 600m
}

function generateObstacles() {
  while (nextObstacleWorldX < cameraX + canvas.width * 1.6) {
    const diff = getDiff(nextObstacleWorldX);
    const spacing = Math.max(220, 560 - diff * 340);
    const oscAmp = diff * canvas.height * 0.18;
    const oscSpeed = 0.007 + diff * 0.018;
    const phase = Math.random() * Math.PI * 2;

    // Unlock obstacle types progressively with distance
    const rand = Math.random();
    let type = 'pillar';
    if (diff > 0.15 && rand < 0.28) type = 'drop';
    else if (diff > 0.15 && rand < 0.5) type = 'rise';
    else if (diff > 0.35 && rand < 0.65) type = 'hbar';

    let obs = { worldX: nextObstacleWorldX, type, oscAmp, oscSpeed, phase };

    if (type === 'pillar') {
      const gapSize = Math.max(165, 420 - diff * 255);
      const margin = gapSize / 2 + 35;
      obs.gapCenter = margin + Math.random() * (canvas.height - margin * 2);
      obs.gapHalfSize = gapSize / 2;
      obs.width = 32;
    } else if (type === 'drop') {
      obs.depth = 90 + diff * 130 + Math.random() * 70;
      obs.width = 52;
      obs.oscAmp = diff * canvas.height * 0.08; // gentler osc for depth changes
    } else if (type === 'rise') {
      obs.depth = 90 + diff * 130 + Math.random() * 70;
      obs.width = 52;
      obs.oscAmp = diff * canvas.height * 0.08;
    } else if (type === 'hbar') {
      const minY = canvas.height * 0.2, maxY = canvas.height * 0.8;
      obs.barY = minY + Math.random() * (maxY - minY);
      obs.barH = 18 + diff * 22;
      obs.barW = 90 + Math.random() * 80;
      obs.oscAmp = diff * canvas.height * 0.22;
      obs.oscSpeed = oscSpeed * 1.3;
    }

    obstacles.push(obs);
    nextObstacleWorldX += spacing;
  }
  while (obstacles.length && obstacles[0].worldX < cameraX - 300)
    obstacles.shift();
}

function getGapCenter(obs) {
  return obs.gapCenter + obs.oscAmp * Math.sin(gameTime * obs.oscSpeed + obs.phase);
}

function getLiveDepth(obs) {
  return obs.depth + obs.oscAmp * Math.abs(Math.sin(gameTime * obs.oscSpeed + obs.phase));
}

function getLiveBarY(obs) {
  return obs.barY + obs.oscAmp * Math.sin(gameTime * obs.oscSpeed + obs.phase);
}

function drawPillarSpikes(cx, y, width, dir) {
  const sw = 16, sh = 20;
  ctx.fillStyle = '#c33'; ctx.strokeStyle = '#900'; ctx.lineWidth = 1;
  for (let sx = cx - width / 2 + sw / 2; sx <= cx + width / 2; sx += sw) {
    ctx.beginPath();
    if (dir === 'down') {
      ctx.moveTo(sx - sw / 2, y); ctx.lineTo(sx, y + sh); ctx.lineTo(sx + sw / 2, y);
    } else {
      ctx.moveTo(sx - sw / 2, y); ctx.lineTo(sx, y - sh); ctx.lineTo(sx + sw / 2, y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
}

function drawObstacles() {
  for (const obs of obstacles) {
    const sx = obs.worldX - cameraX;
    if (sx < -100 || sx > canvas.width + 100) continue;
    const diff = getDiff(obs.worldX);
    const shade = Math.round(30 + diff * 30);
    ctx.fillStyle = `rgb(${shade + 10},${shade / 2},${shade / 2})`;

    if (obs.type === 'pillar') {
      const gc = getGapCenter(obs);
      const topH = gc - obs.gapHalfSize, bottomY = gc + obs.gapHalfSize;
      const hw = obs.width / 2;
      if (topH > 0) { ctx.fillRect(sx - hw, 0, obs.width, topH); drawPillarSpikes(sx, topH, obs.width, 'down'); }
      if (bottomY < canvas.height) { ctx.fillRect(sx - hw, bottomY, obs.width, canvas.height - bottomY); drawPillarSpikes(sx, bottomY, obs.width, 'up'); }

    } else if (obs.type === 'drop') {
      const d = getLiveDepth(obs), hw = obs.width / 2;
      ctx.fillRect(sx - hw, 0, obs.width, d);
      drawPillarSpikes(sx, d, obs.width, 'down');

    } else if (obs.type === 'rise') {
      const d = getLiveDepth(obs), hw = obs.width / 2;
      ctx.fillRect(sx - hw, canvas.height - d, obs.width, d);
      drawPillarSpikes(sx, canvas.height - d, obs.width, 'up');

    } else if (obs.type === 'hbar') {
      const by = getLiveBarY(obs), hw = obs.barW / 2, hh = obs.barH / 2;
      ctx.fillRect(sx - hw, by - hh, obs.barW, obs.barH);
      drawPillarSpikes(sx, by - hh, obs.barW, 'up');
      drawPillarSpikes(sx, by + hh, obs.barW, 'down');
    }
  }
}

function checkObstacleCollision() {
  if (!bob.alive) return;
  const p = getBobParts();
  const sx = getScreenX();
  const pts = [
    { x: p.head.x, y: p.head.y - p.head.r },
    { x: p.head.x, y: p.head.y + p.head.r },
    { x: p.leftFoot.x, y: p.leftFoot.y + p.leftFoot.r },
    { x: p.rightFoot.x, y: p.rightFoot.y + p.rightFoot.r },
    { x: p.leftHand.x - p.leftHand.r, y: p.leftHand.y },
    { x: p.rightHand.x + p.rightHand.r, y: p.rightHand.y },
    { x: sx, y: bob.y },
  ];
  const reach = 20; // spike reach beyond block edge

  for (const obs of obstacles) {
    const obsSX = obs.worldX - cameraX;

    if (obs.type === 'pillar') {
      const hw = obs.width / 2 + reach;
      const gc = getGapCenter(obs);
      const topKill = gc - obs.gapHalfSize + reach;
      const bottomKill = gc + obs.gapHalfSize - reach;
      for (const pt of pts) {
        if (Math.abs(pt.x - obsSX) > hw) continue;
        if (pt.y < topKill || pt.y > bottomKill) { killBob(); return; }
      }

    } else if (obs.type === 'drop') {
      const hw = obs.width / 2 + reach;
      const killY = getLiveDepth(obs) + reach;
      for (const pt of pts) {
        if (Math.abs(pt.x - obsSX) > hw) continue;
        if (pt.y < killY) { killBob(); return; }
      }

    } else if (obs.type === 'rise') {
      const hw = obs.width / 2 + reach;
      const killY = canvas.height - getLiveDepth(obs) - reach;
      for (const pt of pts) {
        if (Math.abs(pt.x - obsSX) > hw) continue;
        if (pt.y > killY) { killBob(); return; }
      }

    } else if (obs.type === 'hbar') {
      const hw = obs.barW / 2 + reach;
      const by = getLiveBarY(obs);
      const topKill = by - obs.barH / 2 - reach;
      const bottomKill = by + obs.barH / 2 + reach;
      for (const pt of pts) {
        if (Math.abs(pt.x - obsSX) > hw) continue;
        if (pt.y > topKill && pt.y < bottomKill) { killBob(); return; }
      }
    }
  }
}

// Border spike collision (screen-space, no right wall)
function checkSpikeCollision() {
  if (!bob.alive) return;
  const p = getBobParts();
  const sx = getScreenX();
  const testPoints = [
    { x: p.head.x, y: p.head.y - p.head.r },
    { x: p.head.x, y: p.head.y + p.head.r },
    { x: p.leftFoot.x, y: p.leftFoot.y + p.leftFoot.r },
    { x: p.rightFoot.x, y: p.rightFoot.y + p.rightFoot.r },
    { x: p.leftHand.x - p.leftHand.r, y: p.leftHand.y },
    { x: p.rightHand.x + p.rightHand.r, y: p.rightHand.y },
    { x: sx, y: bob.y },
  ];
  for (const s of spikes) {
    const h = getSpikeH(s);
    for (const pt of testPoints) {
      let hit = false;
      if (s.dir === 'up'    && pt.y > s.y - h && pt.y < s.y && Math.abs(pt.x - s.x) < s.w) hit = true;
      if (s.dir === 'down'  && pt.y < s.y + h && pt.y > s.y && Math.abs(pt.x - s.x) < s.w) hit = true;
      if (s.dir === 'right' && pt.x < s.x + h && pt.x > s.x && Math.abs(pt.y - s.y) < s.w / 2) hit = true;
      if (hit) { killBob(); return; }
    }
  }
}

// Particles
const particles = [];
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2, speed = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.01 + Math.random() * 0.02, size: 2 + Math.random() * 5, color });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Score / lives
let gameTime = 0;
let bestMaxWorldX = parseFloat(localStorage.getItem('bobBestWorldX') || '0');
let lives = 3;
let gameOver = false;
let newRecord = false;

// Title screen
let titleScreen = true;
let titleTime = 0;

function getDistanceM() { return Math.floor(Math.max(0, bob.worldX) / 20); }
function getBestDistanceM() { return Math.floor(bestMaxWorldX / 20); }

// Kill / respawn
function killBob() {
  bob.alive = false; dragging = false;
  if (bob.worldX > bestMaxWorldX) {
    bestMaxWorldX = bob.worldX;
    newRecord = true;
    localStorage.setItem('bobBestWorldX', bestMaxWorldX);
  }
  lives--;
  bob.respawnTimer = lives <= 0 ? 999999 : 90;
  if (lives <= 0) gameOver = true;
  const sx = getScreenX();
  spawnParticles(sx, bob.y, '#f4c2a1', 20);
  spawnParticles(sx, bob.y, '#4a7ab5', 15);
  spawnParticles(sx, bob.y, '#d4a040', 10);
  playPop();
}

function respawnBob() {
  bob.worldX = cameraX + canvas.width * 0.35;
  bob.y = canvas.height / 2;
  bob.vx = 0; bob.vy = 0; bob.alive = true; bob.opacity = 1; bob.scale = 1;
  // Push wall back to give breathing room after death
  deathWallWorldX = Math.min(deathWallWorldX, bob.worldX - canvas.width * 0.45);
  const sx = getScreenX();
  spawnParticles(sx, bob.y, '#fff', 15);
  spawnParticles(sx, bob.y, '#aaf', 10);
  playRespawn();
}

function restartGame() {
  lives = 3; gameTime = 0; gameOver = false; newRecord = false;
  cameraX = 0; nextObstacleWorldX = 700;
  obstacles.length = 0;
  bob.worldX = canvas.width * 0.35;
  bob.y = canvas.height / 2;
  bob.vx = 0; bob.vy = 0; bob.alive = true; bob.opacity = 1; bob.scale = 1;
  deathWallWorldX = bob.worldX - canvas.width * 0.45;
}

// Nose squeak visual
let squeakTimer = 0;

// Input
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

// Dragging — offset stored in world space
let dragging = false;
let dragOffX = 0, dragOffY = 0;

function hitTestBob(mx, my) {
  if (!bob.alive) return false;
  const p = getBobParts();
  const dx = mx - p.head.x, dy = my - p.head.y;
  if (dx * dx + dy * dy < (p.head.r + 10) * (p.head.r + 10)) return true;
  const bx = p.body.x - p.body.w / 2, by = p.body.y - p.body.h / 2;
  if (mx > bx - 5 && mx < bx + p.body.w + 5 && my > by - 5 && my < by + p.body.h + 5) return true;
  for (const key of ['leftHand', 'rightHand', 'leftFoot', 'rightFoot']) {
    const part = p[key];
    if (Math.hypot(mx - part.x, my - part.y) < part.r + 10) return true;
  }
  for (const key of ['leftArm', 'rightArm', 'leftLeg', 'rightLeg']) {
    const limb = p[key];
    if (distToSegment(mx, my, limb.x1, limb.y1, limb.x2, limb.y2) < 12) return true;
  }
  return false;
}

function hitTestNose(mx, my) {
  const p = getBobParts();
  const dx = mx - p.nose.x, dy = my - p.nose.y;
  return dx * dx + dy * dy < (p.nose.r + 4) * (p.nose.r + 4);
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1, len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / len2));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function onDown(e) {
  e.preventDefault();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (titleScreen) {
    titleScreen = false;
    restartGame();
    return;
  }
  if (gameOver) { restartGame(); return; }
  const { x, y } = getPos(e);
  if (hitTestNose(x, y)) { playSqueak(); squeakTimer = 15; }
  if (hitTestBob(x, y)) {
    dragging = true;
    dragOffX = bob.worldX - (x + cameraX);
    dragOffY = bob.y - y;
    bob.wobbleSpeed = 0.15;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!dragging) return;
  const { x, y } = getPos(e);
  const newWorldX = (x + cameraX) + dragOffX;
  const newY = y + dragOffY;
  bob.vx = (newWorldX - bob.worldX) * 0.5;
  bob.vy = (newY - bob.y) * 0.5;
  bob.worldX = newWorldX;
  bob.y = newY;
}

function onUp() { dragging = false; }

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// Background (scrolling grid)
function drawBackground() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const gs = 80;
  const offX = cameraX % gs;
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for (let x = -offX; x < canvas.width + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  // Danger border (top and bottom only — left wall is the death wall)
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(0, 0, canvas.width, 8);
  ctx.fillRect(0, canvas.height - 8, canvas.width, 8);
}

// HUD
function drawHUD() {
  const dist = getDistanceM(), best = getBestDistanceM();
  const diff = getDiff(bob.worldX);

  ctx.textAlign = 'left'; ctx.font = '20px monospace';
  ctx.fillStyle = 'rgba(255,80,80,0.9)';
  ctx.fillText('♥'.repeat(Math.max(0, lives)), 35, 65);

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 22px monospace';
  ctx.fillText(`${dist}m`, canvas.width / 2, 65);
  if (bestMaxWorldX > 0) {
    ctx.fillStyle = 'rgba(255,215,0,0.65)'; ctx.font = '13px monospace';
    ctx.fillText(`best ${best}m`, canvas.width / 2, 84);
  }

  if (diff > 0.05) {
    const level = diff < 0.33 ? 'warming up' : diff < 0.66 ? 'getting spiky' : 'DANGER ZONE';
    ctx.textAlign = 'right';
    ctx.fillStyle = `rgba(255,${Math.round(200 - diff * 180)},30,0.8)`;
    ctx.font = 'bold 13px monospace';
    ctx.fillText(level, canvas.width - 35, 65);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px monospace';
  ctx.textAlign = 'left'; ctx.fillText('drag Bob · click nose', 35, canvas.height - 40);
  ctx.textAlign = 'right'; ctx.fillText('avoid spikes!', canvas.width - 35, canvas.height - 40);

  // Wall speed indicator
  const sf = getWallSpeedFraction();
  if (sf > 0.01) {
    const spd = getWallSpeed().toFixed(1);
    const r = Math.round(150 + sf * 105), g = Math.round(150 - sf * 150);
    ctx.textAlign = 'left';
    ctx.fillStyle = `rgba(${r},${g},30,0.85)`;
    ctx.font = 'bold 13px monospace';
    ctx.fillText(`wall ${spd}x`, 35, 90);
  }

  if (squeakTimer > 0) {
    const sx = getScreenX();
    ctx.fillStyle = `rgba(255,200,100,${squeakTimer / 15})`;
    ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SQUEAK!', sx, bob.y - 100 * bob.scale);
  }

  if (gameOver) {
    const cx = canvas.width / 2, cy = canvas.height / 2;

    // Dim backdrop
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Card background
    const cardW = 380, cardH = newRecord ? 230 : 200;
    ctx.fillStyle = '#0d1b2a';
    roundRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH, 16);
    ctx.fill();
    ctx.strokeStyle = newRecord ? '#ffd700' : '#3a3a5a';
    ctx.lineWidth = newRecord ? 2.5 : 1.5;
    roundRect(cx - cardW / 2, cy - cardH / 2, cardW, cardH, 16);
    ctx.stroke();

    ctx.textAlign = 'center';

    // Title
    ctx.fillStyle = '#ff5555'; ctx.font = 'bold 42px monospace';
    ctx.fillText('GAME OVER', cx, cy - cardH / 2 + 52);

    // New record flash
    if (newRecord) {
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold 16px monospace';
      ctx.fillText('★  NEW RECORD  ★', cx, cy - cardH / 2 + 82);
    }

    // Best distance
    const yOff = newRecord ? 28 : 10;
    ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 28px monospace';
    ctx.fillText(`${best}m`, cx, cy - cardH / 2 + 118 + yOff);

    // Saved badge
    ctx.fillStyle = 'rgba(80,200,120,0.85)'; ctx.font = '13px monospace';
    ctx.fillText('✓  saved to this device', cx, cy - cardH / 2 + 145 + yOff);

    // Play again prompt
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '15px monospace';
    ctx.fillText('click anywhere to play again', cx, cy - cardH / 2 + 185 + yOff);
  }
}

function drawTitleScreen() {
  // Background
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const gs = 80;
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  const cx = canvas.width / 2, cy = canvas.height / 2;

  // Title "GAME OF"
  ctx.textAlign = 'center';
  ctx.shadowBlur = 25; ctx.shadowColor = '#4a7ab5';
  ctx.fillStyle = 'rgba(200,220,255,0.95)';
  ctx.font = `bold ${Math.min(64, canvas.width * 0.09)}px monospace`;
  ctx.fillText('GAME OF', cx, cy - canvas.height * 0.28);
  ctx.shadowBlur = 0;

  // Title "BOB"
  const bobPulse = 1 + 0.04 * Math.sin(titleTime * 0.04);
  ctx.save();
  ctx.translate(cx, cy - canvas.height * 0.16);
  ctx.scale(bobPulse, bobPulse);
  ctx.shadowBlur = 40; ctx.shadowColor = '#ffd700';
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${Math.min(100, canvas.width * 0.14)}px monospace`;
  ctx.fillText('BOB', 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Animated Bob character — positioned for title
  bob.wobble += 0.04;
  bob.wobbleSpeed = 0.04;
  bob.worldX = cx;
  bob.y = cy + canvas.height * 0.06;
  bob.scale = Math.min(1.3, canvas.width / 600);
  bob.alive = true;
  cameraX = 0;
  drawBob();

  // Subtitle
  ctx.fillStyle = 'rgba(160,190,255,0.65)';
  ctx.font = `${Math.min(15, canvas.width * 0.022)}px monospace`;
  ctx.fillText('drag Bob through spike-filled corridors', cx, cy + canvas.height * 0.26);
  ctx.fillText('survive as long as you can!', cx, cy + canvas.height * 0.32);

  // Best score
  if (bestMaxWorldX > 0) {
    ctx.fillStyle = 'rgba(255,215,0,0.85)';
    ctx.font = `bold ${Math.min(17, canvas.width * 0.025)}px monospace`;
    ctx.fillText(`best: ${getBestDistanceM()}m`, cx, cy + canvas.height * 0.39);
  }

  // Blinking "tap to play"
  if (Math.sin(titleTime * 0.06) > -0.3) {
    ctx.fillStyle = `rgba(255,255,255,${0.7 + 0.3 * Math.sin(titleTime * 0.06)})`;
    ctx.font = `bold ${Math.min(22, canvas.width * 0.032)}px monospace`;
    ctx.fillText('tap to play', cx, cy + canvas.height * 0.46);
  }

  // Subtle red danger glow at edges
  const edgeAlpha = 0.08 + 0.04 * Math.sin(titleTime * 0.03);
  const gL = ctx.createLinearGradient(0, 0, 60, 0);
  gL.addColorStop(0, `rgba(200,0,0,${edgeAlpha})`); gL.addColorStop(1, 'rgba(200,0,0,0)');
  ctx.fillStyle = gL; ctx.fillRect(0, 0, 60, canvas.height);
  const gR = ctx.createLinearGradient(canvas.width, 0, canvas.width - 60, 0);
  gR.addColorStop(0, `rgba(200,0,0,${edgeAlpha})`); gR.addColorStop(1, 'rgba(200,0,0,0)');
  ctx.fillStyle = gR; ctx.fillRect(canvas.width - 60, 0, 60, canvas.height);

  titleTime++;
}

// Main loop
function update() {
  if (gameOver) { updateParticles(); return; }
  if (!bob.alive) {
    bob.respawnTimer--;
    if (bob.respawnTimer <= 0) respawnBob();
    if (squeakTimer > 0) squeakTimer--;
    updateParticles();
    return;
  }

  gameTime++;

  if (!dragging) {
    bob.vx *= 0.98; bob.vy *= 0.98;
    bob.worldX += bob.vx; bob.y += bob.vy;
    bob.wobbleSpeed *= 0.96;
  } else {
    bob.wobbleSpeed = Math.min(bob.wobbleSpeed, 0.3);
  }
  bob.wobble += bob.wobbleSpeed;

  updateCamera();
  deathWallWorldX += getWallSpeed();
  if (bob.worldX < deathWallWorldX + 38) { killBob(); return; }
  generateObstacles();
  checkSpikeCollision();
  checkObstacleCollision();

  if (squeakTimer > 0) squeakTimer--;
  updateParticles();
}

function draw() {
  drawBackground();
  drawDeathWall();
  drawObstacles();
  drawSpikes();
  drawBob();
  drawParticles();
  drawHUD();
}

function loop() {
  if (titleScreen) {
    drawTitleScreen();
    requestAnimationFrame(loop);
    return;
  }
  update(); draw(); requestAnimationFrame(loop);
}

resizeCanvas();
bob.worldX = canvas.width * 0.35;
bob.y = canvas.height / 2;
deathWallWorldX = bob.worldX - canvas.width * 0.45;
loop();
</script>
