<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Bob</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createSpikes();
  // Keep Bob inside bounds after resize
  bob.x = Math.max(50, Math.min(canvas.width - 50, bob.x));
  bob.y = Math.max(80, Math.min(canvas.height - 80, bob.y));
}

window.addEventListener('resize', resizeCanvas);

// Audio context for squeak
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSqueak() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.2);
}

function playPop() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

function playRespawn() {
  [0, 100, 200].forEach((delay, i) => {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400 + i * 200, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.12);
    }, delay);
  });
}

// Bob the rag doll
const bob = {
  x: 400,
  y: 300,
  vx: 0,
  vy: 0,
  scale: 1,
  opacity: 1,
  alive: true,
  respawnTimer: 0,
  wobble: 0,
  wobbleSpeed: 0,
  // Body part sizes relative to position
  headRadius: 28,
  bodyWidth: 36,
  bodyHeight: 50,
  armLength: 40,
  legLength: 45,
};

function getBobParts() {
  const { x, y, scale } = bob;
  const w = bob.wobble;
  return {
    head: { x: x + Math.sin(w) * 2, y: y - 65 * scale, r: bob.headRadius * scale },
    nose: { x: x + Math.sin(w) * 2 + 2 * scale, y: y - 62 * scale, r: 6 * scale },
    body: { x: x, y: y - 20 * scale, w: bob.bodyWidth * scale, h: bob.bodyHeight * scale },
    leftArm: { x1: x - 18 * scale, y1: y - 38 * scale, x2: x - 38 * scale + Math.sin(w + 1) * 8, y2: y + 5 * scale },
    rightArm: { x1: x + 18 * scale, y1: y - 38 * scale, x2: x + 38 * scale + Math.sin(w + 2) * 8, y2: y + 5 * scale },
    leftLeg: { x1: x - 10 * scale, y1: y + 28 * scale, x2: x - 20 * scale + Math.sin(w) * 5, y2: y + 72 * scale },
    rightLeg: { x1: x + 10 * scale, y1: y + 28 * scale, x2: x + 20 * scale + Math.sin(w + 1.5) * 5, y2: y + 72 * scale },
    leftHand: { x: x - 38 * scale + Math.sin(w + 1) * 8, y: y + 5 * scale, r: 7 * scale },
    rightHand: { x: x + 38 * scale + Math.sin(w + 2) * 8, y: y + 5 * scale, r: 7 * scale },
    leftFoot: { x: x - 20 * scale + Math.sin(w) * 5, y: y + 72 * scale, r: 8 * scale },
    rightFoot: { x: x + 20 * scale + Math.sin(w + 1.5) * 5, y: y + 72 * scale, r: 8 * scale },
  };
}

function drawBob() {
  if (!bob.alive) return;
  ctx.globalAlpha = bob.opacity;
  const p = getBobParts();
  const lw = 4 * bob.scale;

  // Legs
  ctx.strokeStyle = '#5b8c5a';
  ctx.lineWidth = lw + 4;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(p.leftLeg.x1, p.leftLeg.y1); ctx.lineTo(p.leftLeg.x2, p.leftLeg.y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.rightLeg.x1, p.rightLeg.y1); ctx.lineTo(p.rightLeg.x2, p.rightLeg.y2); ctx.stroke();

  // Feet (little shoes)
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.arc(p.leftFoot.x, p.leftFoot.y, p.leftFoot.r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.rightFoot.x, p.rightFoot.y, p.rightFoot.r, 0, Math.PI * 2); ctx.fill();

  // Arms
  ctx.strokeStyle = '#f4c2a1';
  ctx.lineWidth = lw + 2;
  ctx.beginPath(); ctx.moveTo(p.leftArm.x1, p.leftArm.y1); ctx.lineTo(p.leftArm.x2, p.leftArm.y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.rightArm.x1, p.rightArm.y1); ctx.lineTo(p.rightArm.x2, p.rightArm.y2); ctx.stroke();

  // Hands (little circles)
  ctx.fillStyle = '#f4c2a1';
  ctx.beginPath(); ctx.arc(p.leftHand.x, p.leftHand.y, p.leftHand.r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.rightHand.x, p.rightHand.y, p.rightHand.r, 0, Math.PI * 2); ctx.fill();

  // Body (overalls)
  ctx.fillStyle = '#4a7ab5';
  const bx = p.body.x - p.body.w / 2;
  const by = p.body.y - p.body.h / 2;
  roundRect(bx, by, p.body.w, p.body.h, 8 * bob.scale);
  ctx.fill();

  // Overall straps
  ctx.strokeStyle = '#3a6a9f';
  ctx.lineWidth = 3 * bob.scale;
  ctx.beginPath();
  ctx.moveTo(bx + 4, by); ctx.lineTo(bx + 8, by - 12 * bob.scale);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx + p.body.w - 4, by); ctx.lineTo(bx + p.body.w - 8, by - 12 * bob.scale);
  ctx.stroke();

  // Pocket
  ctx.fillStyle = '#3a6a9f';
  roundRect(p.body.x - 7 * bob.scale, p.body.y + 5 * bob.scale, 14 * bob.scale, 12 * bob.scale, 3 * bob.scale);
  ctx.fill();

  // Button
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(p.body.x, p.body.y - 12 * bob.scale, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = '#f4c2a1';
  ctx.beginPath(); ctx.arc(p.head.x, p.head.y, p.head.r, 0, Math.PI * 2); ctx.fill();

  // Stitch marks on head (rag doll detail)
  ctx.strokeStyle = '#c4926e';
  ctx.lineWidth = 1.5 * bob.scale;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(p.head.x, p.head.y, p.head.r - 3 * bob.scale, -0.3, 0.8);
  ctx.stroke();
  ctx.setLineDash([]);

  // Hair (yarn-like tufts)
  ctx.strokeStyle = '#d4a040';
  ctx.lineWidth = 2.5 * bob.scale;
  ctx.lineCap = 'round';
  for (let i = -3; i <= 3; i++) {
    const angle = -Math.PI / 2 + i * 0.2;
    const sx = p.head.x + Math.cos(angle) * (p.head.r - 2);
    const sy = p.head.y + Math.sin(angle) * (p.head.r - 2);
    const ex = p.head.x + Math.cos(angle) * (p.head.r + 8 * bob.scale) + Math.sin(bob.wobble + i) * 3;
    const ey = p.head.y + Math.sin(angle) * (p.head.r + 8 * bob.scale);
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  }

  // Eyes (button eyes - rag doll style)
  const eyeOffX = 10 * bob.scale;
  const eyeY = p.head.y - 3 * bob.scale;

  // Left eye button
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(p.head.x - eyeOffX, eyeY, 5 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(p.head.x - eyeOffX, eyeY, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();
  // X stitch on button
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1 * bob.scale;
  ctx.beginPath();
  ctx.moveTo(p.head.x - eyeOffX - 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x - eyeOffX + 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.moveTo(p.head.x - eyeOffX + 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x - eyeOffX - 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.stroke();

  // Right eye button
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(p.head.x + eyeOffX, eyeY, 5 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(p.head.x + eyeOffX, eyeY, 3 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1 * bob.scale;
  ctx.beginPath();
  ctx.moveTo(p.head.x + eyeOffX - 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x + eyeOffX + 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.moveTo(p.head.x + eyeOffX + 2.5 * bob.scale, eyeY - 2.5 * bob.scale);
  ctx.lineTo(p.head.x + eyeOffX - 2.5 * bob.scale, eyeY + 2.5 * bob.scale);
  ctx.stroke();

  // Mouth (stitched smile)
  ctx.strokeStyle = '#c4926e';
  ctx.lineWidth = 2 * bob.scale;
  ctx.setLineDash([2, 3]);
  ctx.beginPath();
  ctx.arc(p.head.x + 2 * bob.scale, p.head.y + 6 * bob.scale, 8 * bob.scale, 0.2, Math.PI - 0.2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Nose (round button nose)
  ctx.fillStyle = '#e88';
  ctx.beginPath(); ctx.arc(p.nose.x, p.nose.y, p.nose.r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c66';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cheek blush
  ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
  ctx.beginPath(); ctx.arc(p.head.x - 16 * bob.scale, p.head.y + 4 * bob.scale, 6 * bob.scale, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.head.x + 20 * bob.scale, p.head.y + 4 * bob.scale, 6 * bob.scale, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Spikes
const spikes = [];
function createSpikes() {
  spikes.length = 0;
  // Bottom spikes
  for (let x = 40; x < canvas.width - 20; x += 60) {
    spikes.push({ x, y: canvas.height, w: 20, h: 25, dir: 'up' });
  }
  // Top spikes
  for (let x = 70; x < canvas.width - 20; x += 60) {
    spikes.push({ x, y: 0, w: 20, h: 25, dir: 'down' });
  }
  // Left spikes
  for (let y = 80; y < canvas.height - 60; y += 60) {
    spikes.push({ x: 0, y, w: 25, h: 20, dir: 'right' });
  }
  // Right spikes
  for (let y = 110; y < canvas.height - 60; y += 60) {
    spikes.push({ x: canvas.width, y, w: 25, h: 20, dir: 'left' });
  }
}
function drawSpikes() {
  ctx.fillStyle = '#c33';
  ctx.strokeStyle = '#900';
  ctx.lineWidth = 1;
  for (const s of spikes) {
    ctx.beginPath();
    if (s.dir === 'up') {
      ctx.moveTo(s.x - s.w / 2, s.y);
      ctx.lineTo(s.x, s.y - s.h);
      ctx.lineTo(s.x + s.w / 2, s.y);
    } else if (s.dir === 'down') {
      ctx.moveTo(s.x - s.w / 2, s.y);
      ctx.lineTo(s.x, s.y + s.h);
      ctx.lineTo(s.x + s.w / 2, s.y);
    } else if (s.dir === 'right') {
      ctx.moveTo(s.x, s.y - s.h / 2);
      ctx.lineTo(s.x + s.w, s.y);
      ctx.lineTo(s.x, s.y + s.h / 2);
    } else if (s.dir === 'left') {
      ctx.moveTo(s.x, s.y - s.h / 2);
      ctx.lineTo(s.x - s.w, s.y);
      ctx.lineTo(s.x, s.y + s.h / 2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

// Particles for death/respawn
const particles = [];

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      size: 2 + Math.random() * 5,
      color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Dragging
let dragging = false;
let dragOffX = 0, dragOffY = 0;

function hitTestBob(mx, my) {
  if (!bob.alive) return false;
  const p = getBobParts();
  // Check all body parts
  const dx = mx - p.head.x, dy = my - p.head.y;
  if (dx * dx + dy * dy < (p.head.r + 10) * (p.head.r + 10)) return true;
  const bx = p.body.x - p.body.w / 2, by = p.body.y - p.body.h / 2;
  if (mx > bx - 5 && mx < bx + p.body.w + 5 && my > by - 5 && my < by + p.body.h + 5) return true;
  // Arms, legs, hands, feet — generous hit area
  for (const key of ['leftHand', 'rightHand', 'leftFoot', 'rightFoot']) {
    const part = p[key];
    const d = Math.hypot(mx - part.x, my - part.y);
    if (d < part.r + 10) return true;
  }
  // Limb lines
  for (const key of ['leftArm', 'rightArm', 'leftLeg', 'rightLeg']) {
    const limb = p[key];
    if (distToSegment(mx, my, limb.x1, limb.y1, limb.x2, limb.y2) < 12) return true;
  }
  return false;
}

function hitTestNose(mx, my) {
  const p = getBobParts();
  const dx = mx - p.nose.x, dy = my - p.nose.y;
  return dx * dx + dy * dy < (p.nose.r + 4) * (p.nose.r + 4);
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// Spike collision
function checkSpikeCollision() {
  if (!bob.alive) return;
  const p = getBobParts();
  const testPoints = [
    { x: p.head.x, y: p.head.y - p.head.r },
    { x: p.head.x, y: p.head.y + p.head.r },
    { x: p.leftFoot.x, y: p.leftFoot.y + p.leftFoot.r },
    { x: p.rightFoot.x, y: p.rightFoot.y + p.rightFoot.r },
    { x: p.leftHand.x - p.leftHand.r, y: p.leftHand.y },
    { x: p.rightHand.x + p.rightHand.r, y: p.rightHand.y },
    { x: bob.x, y: bob.y },
  ];

  for (const s of spikes) {
    for (const pt of testPoints) {
      let hit = false;
      if (s.dir === 'up' && pt.y > s.y - s.h && pt.y < s.y && Math.abs(pt.x - s.x) < s.w) hit = true;
      if (s.dir === 'down' && pt.y < s.y + s.h && pt.y > s.y && Math.abs(pt.x - s.x) < s.w) hit = true;
      if (s.dir === 'right' && pt.x < s.x + s.w && pt.x > s.x && Math.abs(pt.y - s.y) < s.h) hit = true;
      if (s.dir === 'left' && pt.x > s.x - s.w && pt.x < s.x && Math.abs(pt.y - s.y) < s.h) hit = true;
      if (hit) {
        killBob();
        return;
      }
    }
  }
}

function killBob() {
  bob.alive = false;
  bob.respawnTimer = 90;
  dragging = false;
  spawnParticles(bob.x, bob.y, '#f4c2a1', 20);
  spawnParticles(bob.x, bob.y, '#4a7ab5', 15);
  spawnParticles(bob.x, bob.y, '#d4a040', 10);
  playPop();
}

function respawnBob() {
  bob.x = canvas.width / 2;
  bob.y = canvas.height / 2;
  bob.vx = 0;
  bob.vy = 0;
  bob.alive = true;
  bob.opacity = 1;
  bob.scale = 1;
  spawnParticles(bob.x, bob.y, '#fff', 15);
  spawnParticles(bob.x, bob.y, '#aaf', 10);
  playRespawn();
}

// Nose squeak visual
let squeakTimer = 0;

// Input
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onDown(e) {
  e.preventDefault();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const { x, y } = getPos(e);
  if (hitTestNose(x, y)) {
    playSqueak();
    squeakTimer = 15;
  }
  if (hitTestBob(x, y)) {
    dragging = true;
    dragOffX = bob.x - x;
    dragOffY = bob.y - y;
    bob.wobbleSpeed = 0.15;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!dragging) return;
  const { x, y } = getPos(e);
  const newX = x + dragOffX;
  const newY = y + dragOffY;
  bob.vx = (newX - bob.x) * 0.5;
  bob.vy = (newY - bob.y) * 0.5;
  bob.x = newX;
  bob.y = newY;
}

function onUp(e) {
  if (dragging) {
    dragging = false;
  }
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// Background
function drawBackground() {
  // Floor/wall look
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Danger border (flush to edges)
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(0, 0, canvas.width, 8);
  ctx.fillRect(0, canvas.height - 8, canvas.width, 8);
  ctx.fillRect(0, 0, 8, canvas.height);
  ctx.fillRect(canvas.width - 8, 0, 8, canvas.height);
}

// HUD
function drawHUD() {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Drag Bob around! Click his nose!', 35, canvas.height - 40);
  ctx.textAlign = 'right';
  ctx.fillText('Avoid the spikes!', canvas.width - 35, canvas.height - 40);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('GAME OF BOB', canvas.width / 2, 65);

  // Squeak indicator
  if (squeakTimer > 0) {
    ctx.fillStyle = `rgba(255, 200, 100, ${squeakTimer / 15})`;
    ctx.font = 'bold 18px monospace';
    ctx.fillText('SQUEAK!', bob.x, bob.y - 100 * bob.scale);
  }
}

// Main loop
function update() {
  if (!bob.alive) {
    bob.respawnTimer--;
    if (bob.respawnTimer <= 0) {
      respawnBob();
    }
  } else {
    if (!dragging) {
      // Friction
      bob.vx *= 0.98;
      bob.vy *= 0.98;
      bob.x += bob.vx;
      bob.y += bob.vy;

      // Wobble decay
      bob.wobbleSpeed *= 0.96;
    } else {
      bob.wobbleSpeed = Math.min(bob.wobbleSpeed, 0.3);
    }
    bob.wobble += bob.wobbleSpeed;

    checkSpikeCollision();
  }

  if (squeakTimer > 0) squeakTimer--;
  updateParticles();
}

function draw() {
  drawBackground();
  drawSpikes();
  drawBob();
  drawParticles();
  drawHUD();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resizeCanvas();
bob.x = canvas.width / 2;
bob.y = canvas.height / 2;
loop();
</script>
</body>
</html>
